base: opstack
base_args:
  - --external-builder
  - op-rbuilder
  - --block-time
  - '1'

setup:
  - cd .. && make op-rbuilder-profiling FEATURES=telemetry,loki
  - docker build -t chain-monitor:dev chain-monitor

recipe:
  op-rbuilder:
    services:
      op-rbuilder:
        host_path: ../target/profiling/op-rbuilder
        args:
          - node
          - --builder.playground # enabling op-rbuilder to detect playground environment and service configurations
          - --authrpc.port
          - '{{Port "authrpc" 8551}}'
          - --authrpc.addr
          - 0.0.0.0
          - --authrpc.jwtsecret
          - /data/jwtsecret
          - --http
          - --http.addr
          - 0.0.0.0
          - --http.port
          - '{{Port "http" 8545}}'
          - --chain
          - /data/l2-genesis.json
          - --datadir
          - /data_op_rbuilder
          - --disable-discovery
          - --color
          - never
          - --metrics
          - 0.0.0.0:{{Port "metrics" 9090}}
          - --port
          - '{{Port "rpc" 30303}}'
          - --builder.enable-revert-protection
          - --rollup.builder-secret-key
          - 0x2a871d0798f97d79848a013d4936a73bf4cc922c825d33c1cf7073dff6d409c6
          - --bootnodes
          - '{{Service "bootnode" "rpc" "enode" "79be667ef9dcbbac55a06295ce870b07029bfcdb2dce28d959f2815b16f81798483ada7726a3c4655da4fbfc0e1108a8fd17b448a68554199c47d08ffb10d4b8"}}'
          - --flashblocks.block-time
          - '200'
          - --flashblocks.end-buffer-ms
          - '75'
          - --flashblocks.send-offset-ms
          - '-30'
          - --flashblocks.continuous-build
          - --txpool.max-account-slots
          - '256'
          - --log.stdout.filter
          - op_rbuilder=debug,tx_trace=debug
          - --telemetry.otlp-endpoint
          - http://localhost:4318
          - --telemetry.sampling-ratio
          - '1'
          - --telemetry.loki-url
          - http://localhost:3100
        env:
          ENABLE_TX_TRACKING_DEBUG_LOGS: "true"
        ports:
          authrpc: 4444
          http: 2222
          metrics: 9011
          rpc: 30303
        files:
          /data/jwtsecret: artifact:jwtsecret
          /data/l2-genesis.json: artifact:l2-genesis.json
        volumes:
          /data_op_rbuilder:
            name: data # $HOME/.local/state/builder-playground/devnet/volume-op-rbuilder-data

  chain-monitor:
    services:
      chain-monitor:
        image: chain-monitor
        tag: dev
        args:
          - serve
          - --server-listen-address
          - 0.0.0.0:{{Port "http" 8080}}
          - --l1-rpc
          - http://el:8545
          - --l2-rpc
          - http://host.docker.internal:2222
          - --l2-block-time
          - 1s
          - --l2-monitor-builder-address
          - '0xa0Ee7A142d267C1f36714E4a8F75612F20a79720'
          - --l2-monitor-wallet
          - builder=0xa0Ee7A142d267C1f36714E4a8F75612F20a79720
          - --l2-monitor-flashblocks-private-stream
          - builder=ws://host.docker.internal:1111
        ports:
          http: 8087
        env:
          CHAIN_MONITOR_LOG_LEVEL: debug

  observability:
    services:
      tempo:
        image: grafana/tempo
        tag: 2.9.1
        args:
          - -config.file=/etc/tempo/tempo.yaml
        ports:
          otlp-http: 4318
          http: 3200
        files:
          /etc/tempo/tempo.yaml: tempo.yaml

      loki:
        image: grafana/loki
        tag: latest
        args:
          - -config.file=/etc/loki/loki.yml
        ports:
          http: 3100
        files:
          /etc/loki/loki.yml: loki/loki.yml

      alloy:
        image: grafana/alloy
        tag: latest
        args:
          - run
          - /etc/alloy/config.alloy
          - --storage.path=/var/lib/alloy/data
        files:
          /etc/alloy/config.alloy: alloy/config.alloy
        volumes:
          /var/run/docker.sock:
            host_path: /var/run/docker.sock

      prometheus:
        image: prom/prometheus
        tag: latest
        args:
          - --config.file=/etc/prometheus/prometheus.yml
          - --web.enable-lifecycle
          - --web.enable-remote-write-receiver
          - --storage.tsdb.retention.time=6h
        ports:
          http: 9090
        files:
          /etc/prometheus/prometheus.yml: prometheus.yaml

      grafana:
        image: grafana/grafana
        tag: latest
        ports:
          http: 3000
        env:
          GF_AUTH_ANONYMOUS_ENABLED: "true"
          GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
          GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/op-rbuilder.json
        files:
          /etc/grafana/provisioning/datasources/datasources.yaml: grafana/datasources.yaml
          /etc/grafana/provisioning/dashboards/dashboards.yaml: grafana/dashboards.yaml
          /var/lib/grafana/dashboards/op-rbuilder.json: grafana/dashboards/op-rbuilder.json

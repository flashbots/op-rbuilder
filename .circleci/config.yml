version: 2.1

# -------------------------------------------------------------------
# Orbs
# -------------------------------------------------------------------
orbs:
  gcp-cli: circleci/gcp-cli@3.3.0
  utils: ethereum-optimism/circleci-utils@1.0.24

# -------------------------------------------------------------------
# Executors
# -------------------------------------------------------------------
executors:
  rust-docker:
    docker:
      - image: cimg/rust:1.73.0
    working_directory: ~/project
    resource_class: xlarge

# -------------------------------------------------------------------
# Reusable commands
# -------------------------------------------------------------------
commands:
  init-submodules:
    steps:
      - run:
          name: Initialize submodules
          command: git submodule sync && git submodule update --init --recursive

  install-rust-toolchain:
    parameters:
      toolchain:
        type: string
    steps:
      - run:
          name: Install Rust toolchain (<< parameters.toolchain >>)
          command: |
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "<< parameters.toolchain >>"
            echo 'export PATH=$HOME/.cargo/bin:$PATH' >> "$BASH_ENV"
            source "$BASH_ENV"
            rustup component add rustfmt clippy
            rustc --version
            cargo --version

  install-native-deps:
    parameters:
      packages:
        type: string
    steps:
      - run:
          name: Install native dependencies
          command: |
            sudo apt-get update
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y << parameters.packages >>

  restore-cargo-cache:
    steps:
      - restore_cache:
          keys:
            - cargo-deps-v2-{{ arch }}-{{ checksum "Cargo.lock" }}
            - cargo-deps-v2-{{ arch }}-

  save-cargo-cache:
    steps:
      - save_cache:
          key: cargo-deps-v2-{{ arch }}-{{ checksum "Cargo.lock" }}
          paths:
            - ~/.cargo/registry
            - ~/.cargo/git

# -------------------------------------------------------------------
# Jobs
# -------------------------------------------------------------------
jobs:
  # -----------------------------------------------------------------
  # Docker build (OP-style with docker buildx bake)
  # -----------------------------------------------------------------
  docker-build:
    environment:
      DOCKER_BUILDKIT: 1
    parameters:
      docker_name:
        description: "Docker buildx bake target name"
        type: string
      docker_tags:
        description: "Comma-separated image tags"
        type: string
      registry:
        description: "Docker registry"
        type: string
        default: "us-docker.pkg.dev"
      repo:
        description: "Docker repository path"
        type: string
        default: "oplabs-tools-artifacts/internal-images"
      platforms:
        description: "Target platforms, comma-separated"
        type: string
        default: "linux/amd64"
    machine:
      image: ubuntu-2204:current
    resource_class: 2xlarge+
    steps:
      - checkout
      - utils/gcp-oidc-authenticate
      - run:
          name: Build Docker image
          no_output_timeout: 45m
          command: |
            # Optional: login to Docker Hub to avoid rate limits
            if [[ -v DOCKER_HUB_READ_ONLY_TOKEN ]]; then
              echo "$DOCKER_HUB_READ_ONLY_TOKEN" | docker login -u "$DOCKER_HUB_READ_ONLY_USER" --password-stdin
            fi

            # Export variables for docker-bake.hcl
            export REGISTRY="<< parameters.registry >>"
            export REPOSITORY="<< parameters.repo >>"
            export IMAGE_TAGS="$(echo -ne "<< parameters.docker_tags >>" | sed 's/[^a-zA-Z0-9\n,.]/-/g')"
            export GIT_COMMIT="$(git rev-parse HEAD)"
            export GIT_DATE="$(git show -s --format='%ct')"
            export PLATFORMS="<< parameters.platforms >>"

            # Derive version from git tag if present
            tags_at_commit=$(git tag --points-at $GIT_COMMIT | grep "^<< parameters.docker_name >>/" || true)
            if [ -z "$tags_at_commit" ]; then
              export GIT_VERSION="untagged"
            else
              export GIT_VERSION=$(echo "$tags_at_commit" | sed "s/<< parameters.docker_name >>\///" | sort -V | tail -n 1)
              export IMAGE_TAGS=$GIT_VERSION
            fi
            echo "GIT_VERSION=$GIT_VERSION"
            echo "IMAGE_TAGS=$IMAGE_TAGS"

            # Create buildx builder for multi-platform support
            docker buildx create --driver=docker-container --name=buildx-build --bootstrap --use

            gcloud auth configure-docker << parameters.registry >>

            # Build!
            docker buildx bake \
              --progress plain \
              --builder=buildx-build \
              -f docker-bake.hcl \
              --push \
              << parameters.docker_name >>

  # -----------------------------------------------------------------
  # [op-rbuilder] Formatting check
  # -----------------------------------------------------------------
  op-rbuilder-fmt:
    parameters:
      toolchain:
        type: string
    machine:
      image: ubuntu-2204:current
    resource_class: xlarge
    environment:
      CARGO_TERM_COLOR: always
    steps:
      - checkout
      - init-submodules
      - install-rust-toolchain:
          toolchain: << parameters.toolchain >>
      - restore-cargo-cache
      - run:
          name: Check formatting
          command: cargo +<< parameters.toolchain >> fmt -- --check
      - save-cargo-cache

  # -----------------------------------------------------------------
  # [op-rbuilder] Clippy
  # -----------------------------------------------------------------
  op-rbuilder-clippy:
    parameters:
      toolchain:
        type: string
    machine:
      image: ubuntu-2204:current
    resource_class: xlarge
    environment:
      CARGO_TERM_COLOR: always
      TESTS_TEMP_DIR: /home/circleci/project
    steps:
      - checkout
      - init-submodules
      - install-rust-toolchain:
          toolchain: << parameters.toolchain >>
      - install-native-deps:
          packages: "libsqlite3-dev clang libclang-dev llvm build-essential pkg-config libtss2-dev"
      - restore-cargo-cache
      - run:
          name: Run clippy
          command: cargo +<< parameters.toolchain >> clippy --all-features -- -D warnings
      - save-cargo-cache

  # -----------------------------------------------------------------
  # [op-rbuilder] Tests
  # -----------------------------------------------------------------
  op-rbuilder-test:
    parameters:
      toolchain:
        type: string
      features:
        type: string
    machine:
      image: ubuntu-2204:current
    resource_class: xlarge
    environment:
      CARGO_TERM_COLOR: always
      FEATURES: << parameters.features >>
      TESTS_TEMP_DIR: /home/circleci/project
    steps:
      - checkout
      - init-submodules
      - install-rust-toolchain:
          toolchain: << parameters.toolchain >>
      - install-native-deps:
          packages: "libsqlite3-dev clang libclang-dev llvm build-essential pkg-config libtss2-dev"
      - restore-cargo-cache
      - run:
          name: Install cargo-nextest
          command: |
            curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ${CARGO_HOME:-$HOME/.cargo}/bin
            cargo nextest --version
      - run:
          name: Test (nextest)
          command: |
            if [ -n "<< parameters.features >>" ]; then
              cargo nextest run --workspace --profile ci --features "<< parameters.features >>"
            else
              cargo nextest run --workspace --profile ci
            fi
      - run:
          name: Ensure nextest results directory exists
          when: always
          command: mkdir -p target/nextest/ci
      - when:
          condition: always
          steps:
            - store_test_results:
                path: target/nextest/ci
      - save-cargo-cache

  # -----------------------------------------------------------------
  # [op-rbuilder] Build debug binary for downstream jobs
  # -----------------------------------------------------------------
  op-rbuilder-build:
    parameters:
      toolchain:
        type: string
      features:
        type: string
    machine:
      image: ubuntu-2204:current
    resource_class: xlarge
    environment:
      CARGO_TERM_COLOR: always
      FEATURES: << parameters.features >>
    steps:
      - checkout
      - init-submodules
      - install-rust-toolchain:
          toolchain: << parameters.toolchain >>
      - install-native-deps:
          packages: "libsqlite3-dev clang libclang-dev llvm build-essential pkg-config libtss2-dev"
      - restore-cargo-cache
      - run:
          name: Build op-rbuilder binary
          command: |
            if [ -n "<< parameters.features >>" ]; then
              cargo build -p op-rbuilder --bin op-rbuilder --features "<< parameters.features >>"
            else
              cargo build -p op-rbuilder --bin op-rbuilder
            fi
      - persist_to_workspace:
          root: ~/project
          paths:
            - target/debug/op-rbuilder
      - save-cargo-cache

  # -----------------------------------------------------------------
  # [op-rbuilder] Build tester binary with testing feature
  # -----------------------------------------------------------------
  op-rbuilder-build-testing:
    parameters:
      toolchain:
        type: string
    machine:
      image: ubuntu-2204:current
    resource_class: xlarge
    environment:
      CARGO_TERM_COLOR: always
      TESTS_TEMP_DIR: /home/circleci/project
    steps:
      - checkout
      - init-submodules
      - install-rust-toolchain:
          toolchain: << parameters.toolchain >>
      - install-native-deps:
          packages: "libsqlite3-dev clang libclang-dev llvm build-essential pkg-config libtss2-dev"
      - restore-cargo-cache
      - run:
          name: Build tester binary
          command: cargo build -p op-rbuilder --bin tester --features testing
      - save-cargo-cache

  # -----------------------------------------------------------------
  # [op-rbuilder] Verify reproducible build
  # -----------------------------------------------------------------
  op-rbuilder-verify-reproducible:
    executor: rust-docker
    steps:
      - checkout
      - run:
          name: Ensure stable toolchain installed
          command: |
            rustup default stable
            rustc --version
            cargo --version
      - run:
          name: Install native dependencies
          command: |
            sudo apt-get update
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
              libsqlite3-dev clang libclang-dev llvm build-essential pkg-config libtss2-dev
      - run:
          name: Build twice and compare
          command: |
            export REPRO_FLAGS="--C target-feature=+crt-static -C link-arg=-static-libgcc -C link-arg=-Wl,--build-id=none -C metadata='' --remap-path-prefix=$(pwd)=."
            export SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)"

            RUSTFLAGS="$REPRO_FLAGS" CARGO_INCREMENTAL=0 LC_ALL=C TZ=UTC \
            CFLAGS='-D__TIME__="" -D__DATE__=""' CXXFLAGS='-D__TIME__="" -D__DATE__=""' \
            cargo build --release --locked -p op-rbuilder --target x86_64-unknown-linux-gnu
            mv target/x86_64-unknown-linux-gnu/release/op-rbuilder build1

            cargo clean

            RUSTFLAGS="$REPRO_FLAGS" CARGO_INCREMENTAL=0 LC_ALL=C TZ=UTC \
            CFLAGS='-D__TIME__="" -D__DATE__=""' CXXFLAGS='-D__TIME__="" -D__DATE__=""' \
            cargo build --release --locked -p op-rbuilder --target x86_64-unknown-linux-gnu
            mv target/x86_64-unknown-linux-gnu/release/op-rbuilder build2

            if cmp -s build1 build2; then
              echo "Builds are reproducible"
            else
              echo "Builds differ"
              exit 1
            fi

  # -----------------------------------------------------------------
  # [op-rbuilder] Acceptance tests (op-devstack)
  # -----------------------------------------------------------------
  op-rbuilder-acceptance:
    parameters:
      gate:
        type: string
      devstack_orchestrator:
        type: string
        default: ""
      disable_op_e2e_legacy:
        type: string
        default: ""
      log_level:
        type: string
        default: "info"
      features:
        type: string
    machine:
      image: ubuntu-2204:current
    resource_class: 2xlarge+
    environment:
      CARGO_TERM_COLOR: always
      GATE: << parameters.gate >>
      DISABLE_RUSTC_WRAPPER: "1"
      LOG_LEVEL: << parameters.log_level >>
      FEATURES: << parameters.features >>
    steps:
      - checkout
      - attach_workspace:
          at: ~/project
      - init-submodules
      - install-native-deps:
          packages: "build-essential ca-certificates clang curl git jq libclang-dev libsqlite3-dev libtss2-dev llvm pkg-config"
      - restore_cache:
          keys:
            - op-rbuilder-acceptance-v1-<< parameters.gate >>-{{ arch }}-{{ checksum "Cargo.lock" }}
            - op-rbuilder-acceptance-v1-<< parameters.gate >>-{{ arch }}-
      - run:
          name: Run acceptance tests (<< parameters.gate >>)
          no_output_timeout: 120m
          command: |
            export BUILD_OP_RBUILDER=0
            export RBUILDER_BIN="/home/circleci/project/target/debug/op-rbuilder"
            if [ ! -x "$RBUILDER_BIN" ]; then
              echo "op-rbuilder binary missing from workspace: $RBUILDER_BIN" >&2
              exit 1
            fi
            if [ -n "<< parameters.devstack_orchestrator >>" ]; then
              export DEVSTACK_ORCHESTRATOR="<< parameters.devstack_orchestrator >>"
            fi
            if [ -n "<< parameters.disable_op_e2e_legacy >>" ]; then
              export DISABLE_OP_E2E_LEGACY="<< parameters.disable_op_e2e_legacy >>"
            fi
            ./scripts/ci/run_acceptance_tests.sh
      - run:
          name: Generate JUnit XML test report for CircleCI (acceptance)
          when: always
          command: |
            mkdir -p .ci-artifacts/acceptance/results

            # Prefer logs copied into artifacts by run_acceptance_tests.sh; fall back to optimism checkout logs.
            LOG_DIR="$(ls -td .ci-artifacts/acceptance/testrun-* 2>/dev/null | head -1 || true)"
            if [ -z "$LOG_DIR" ]; then
              LOG_DIR="$(ls -td .ci-work/optimism/op-acceptance-tests/logs/* 2>/dev/null | head -1 || true)"
            fi

            if [ -z "$LOG_DIR" ] || [ ! -f "$LOG_DIR/raw_go_events.log" ]; then
              echo "No raw_go_events.log found; skipping JUnit generation."
              exit 0
            fi

            if command -v gotestsum >/dev/null 2>&1 && gotestsum --version >/dev/null 2>&1; then
              gotestsum --junitfile .ci-artifacts/acceptance/results/results.xml --raw-command cat "$LOG_DIR/raw_go_events.log" || true
            else
              # Fallback for environments where gotestsum is present only as an unconfigured shim.
              go run gotest.tools/gotestsum@v1.12.3 --junitfile .ci-artifacts/acceptance/results/results.xml --raw-command cat "$LOG_DIR/raw_go_events.log" || true
            fi
      - when:
          condition: always
          steps:
            - store_test_results:
                path: .ci-artifacts/acceptance/results
      - save_cache:
          key: op-rbuilder-acceptance-v1-<< parameters.gate >>-{{ arch }}-{{ checksum "Cargo.lock" }}
          paths:
            - ~/.cargo/registry
            - ~/.cargo/git
            - ~/.cache/go-build
            - ~/go/pkg/mod
            - ~/.cache/mise
            - ~/.local/share/mise
      - store_artifacts:
          path: .ci-artifacts/acceptance
          destination: acceptance-<< parameters.gate >>

  # -----------------------------------------------------------------
  # [tdx-quote-provider] Check
  # -----------------------------------------------------------------
  tdx-quote-provider-check:
    executor: rust-docker
    working_directory: ~/project/crates/tdx-quote-provider
    environment:
      CARGO_TERM_COLOR: always
    steps:
      - checkout:
          path: ~/project
      - run:
          name: Ensure stable Rust toolchain with rustfmt
          command: |
            rustup default stable
            rustup component add rustfmt
            rustc --version
            cargo --version
      - run:
          name: Install native dependencies
          command: |
            sudo apt-get update
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y libtss2-dev
      - restore_cache:
          keys:
            - cargo-deps-v1-{{ checksum "~/project/Cargo.lock" }}
            - cargo-deps-v1-
      - run:
          name: Run build
          command: cargo build
      - run:
          name: Check formatting
          command: cargo fmt --all -- --check
      - run:
          name: Run clippy
          command: cargo clippy -- -D warnings
      - run:
          name: Run tests
          command: cargo test --all-features
      - run:
          name: Check for common mistakes
          command: cargo check
      - save_cache:
          key: cargo-deps-v1-{{ checksum "~/project/Cargo.lock" }}
          paths:
            - ~/.cargo/registry
            - ~/.cargo/git

# -------------------------------------------------------------------
# Workflows
# -------------------------------------------------------------------
workflows:
  # Release workflow
  release:
    when:
      or:
        - equal: [main, << pipeline.git.branch >>]
        - matches: { pattern: "^op-rbuilder/v.*", value: << pipeline.git.tag >> }
        - matches: { pattern: "^tdx-quote-provider/v.*", value: << pipeline.git.tag >> }
    jobs:
      # op-rbuilder jobs
      - docker-build:
          filters:
            tags:
              only: /^op-rbuilder\/v.*/
            branches:
              only: feat/policy-engine
          docker_name: op-rbuilder
          docker_tags: << pipeline.git.revision >>
          platforms: "linux/amd64"
          context:
            - oplabs-gcr-internal
      - op-rbuilder-verify-reproducible:
          filters:
            tags:
              only: /^op-rbuilder\/v.*/
            branches:
              only: feat/policy-engine
      # tdx-quote-provider jobs
      - docker-build:
          name: tdx-quote-provider-docker
          filters:
            tags:
              only: /^tdx-quote-provider\/v.*/
            branches:
              only: feat/policy-engine
          docker_name: tdx-quote-provider
          docker_tags: << pipeline.git.revision >>
          platforms: "linux/amd64"
          context:
            - oplabs-gcr-internal

  # CI - runs on PRs and pushes to main
  ci:
    jobs:
      - op-rbuilder-fmt:
          name: fmt
          toolchain: "nightly-2026-02-21"
      - op-rbuilder-clippy:
          name: clippy
          toolchain: "nightly-2026-02-21"
      - op-rbuilder-test:
          name: test
          toolchain: "nightly-2026-02-21"
          features: ""
      - op-rbuilder-build:
          name: build
          toolchain: "nightly-2026-02-21"
          features: ""
      - op-rbuilder-build-testing:
          name: build-testing
          toolchain: "nightly-2026-02-21"
      - op-rbuilder-acceptance:
          name: acceptance-test
          requires:
            - build
          gate: flashblocks
          features: ""
          devstack_orchestrator: sysgo
          disable_op_e2e_legacy: "true"
      - tdx-quote-provider-check: {}
